<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Arithmetic Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-card">
            <h2>Smart Arithmetic Calculator</h2>

            <div class="paradigm-selector">
                <label for="paradigmChoice">Calculation Mode:</label>
                <select id="paradigmChoice" class="styled-select">
                    <option value="procedural">Procedural</option>
                    <option value="oop">Object-Oriented</option>
                    <option value="functional">Functional</option>
                </select>
            </div>

            <div class="inputs">
                <input type="text" id="expressionInput" placeholder="Enter expression or use buttons">
            </div>

            <div class="operators">
                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button onclick="appendValue('/')">÷</button>

                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button onclick="appendValue('*')">×</button>

                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button onclick="appendValue('-')">−</button>

                <button onclick="appendValue('0')">0</button>
                <button onclick="appendValue('.')">.</button>
                <button onclick="appendValue('%')">%</button>
                <button onclick="appendValue('+')">+</button>
            </div>

            <div class="utility-buttons">
                <button onclick="clearCalculator()" class="btn-clear">AC</button>
                <button onclick="deleteLast()" class="btn-delete">DEL</button>
                <button onclick="copyResult()" class="btn-copy">Copy</button>
                <button onclick="handleAction()" class="btn-equal">=</button>
            </div>

            <div id="resultDisplay" class="result">Result: --</div>
        </div>

        <div class="history-card">
            <h2>Recent Calculations</h2>
            <ul id="historyList"></ul>
            <button onclick="clearHistory()" class="btn-history">Clear History</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
