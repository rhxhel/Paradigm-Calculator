<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paradigm Calculator & Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper" id="app-wrapper">
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchTab('calc-tab')">Calculator</button>
            <button class="tab-btn" onclick="switchTab('convert-tab')">Converter</button>
        </div>

        <div class="calculator-container">
            <div class="calculator-card">
                <div id="calc-tab" class="tab-content active">
                    <h2>Paradigm Calculator</h2>
                    <div class="paradigm-selector">
                        <select id="paradigmChoice" class="styled-select">
                            <option value="procedural">Procedural</option>
                            <option value="oop">Object-Oriented</option>
                            <option value="functional">Functional</option>
                        </select>
                    </div>
                    <div class="inputs">
                        <input type="text" id="expressionInput" placeholder="Enter expression">
                    </div>
                </div>

                <div id="convert-tab" class="tab-content">
                    <h2>Unit Converter</h2>
                    <div class="converter-group">
                        <select id="convertType" class="styled-select" onchange="runConversion()">
                            <option value="length">Length (m to ft)</option>
                            <option value="temp">Temp (°C to °F)</option>
                            <option value="weight">Weight (kg to lb)</option>
                        </select>
                    </div>
                    <div class="inputs">
                        <input type="text" id="convertInput" placeholder="0" readonly>
                    </div>
                </div>

                <div class="operators" id="numpad">
                    <button onclick="appendValue('7')">7</button>
                    <button onclick="appendValue('8')">8</button>
                    <button onclick="appendValue('9')">9</button>
                    <button onclick="appendValue('/')" class="calc-only">÷</button>

                    <button onclick="appendValue('4')">4</button>
                    <button onclick="appendValue('5')">5</button>
                    <button onclick="appendValue('6')">6</button>
                    <button onclick="appendValue('*')" class="calc-only">×</button>

                    <button onclick="appendValue('1')">1</button>
                    <button onclick="appendValue('2')">2</button>
                    <button onclick="appendValue('3')">3</button>
                    <button onclick="appendValue('-')" class="calc-only">−</button>

                    <button onclick="appendValue('0')">0</button>
                    <button onclick="appendValue('.')">.</button>
                    <button onclick="appendValue('%')" class="calc-only">%</button>
                    <button onclick="appendValue('+')" class="calc-only">+</button>

                    <button onclick="appendValue('(')" class="calc-only">(</button>
                    <button onclick="appendValue(')')" class="calc-only">)</button>
                    <button onclick="deleteLast()" class="btn-delete">DEL</button>
                    <button onclick="copyResult()" class="calc-only">ANS</button>
                </div>

                <div class="utility-buttons">
                    <button onclick="clearUI()" class="btn-clear">AC</button>
                    <button onclick="handleMainAction()" class="btn-equal">=</button>
                </div>

                <div id="resultDisplay" class="result">Result: --</div>
            </div>

            <div class="history-card">
                <h2>History</h2>
                <ul id="historyList"></ul>
                <button onclick="clearHistory()" class="btn-history">Clear</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
